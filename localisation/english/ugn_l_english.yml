###events
 uniqueness.3.desc: "A nation's history is never simple, but you can always point out a few distinct characteristics. What is your nation known for?"
 
 uniqueness.1.desc: "Unique Generic Nations adds a series of events that lets you choose different ideas, bonuses, and/or modifiers. What countries do you want to trigger these events for?"
 uniqueness.1.a: "trigger the events for everyone."
 uniqueness.1.b: "trigger the events for minor powers."
 uniqueness.1.c: "only trigger the events for players."
 uniqueness.1.d: "trigger the events for everyone but players."
 tt_ugn_released_get_event: "released countries WILL get Unique Generic Nation events from this point"
 tt_ugn_released_not_get_event: "released countries WILL NOT get Unique Generic Nation events"
 
 uniqueness.2.desc: "Oho! Ready to take on the world, are we? Tell me, why do you feel elevated in comparison to the line of averageness?"
 uniqueness.2.a:0 "We have a history of great leaders."
 uniqueness.2.b:0 "Our nation has a great affinity for diplomacy and making friends."
 uniqueness.2.c:0 "[ROOT.GetNonIdeologyName] is among the most wealthy nations in the world, with a strong economy to boot!"
 uniqueness.2.d:0 "Our people's devotion to The Emperor is unmatched!"
 uniqueness.2.e:0 "We are the United States! Bastion of Democracy!"
 uniqueness.2.f:0 "We are the home of the revolution!"
 uniqueness.2.g:0 "We rule the waves."
 uniqueness.2.h:0 "We pride ourselves on the skill of our generals."
 uniqueness.2.i:0 "We're really good at riding horses."
 uniqueness.2.j:0 "We are simply destined for greatness."
 
 
 uniqueness.3.a:0 "We are a shining example of a great nation!"
 uniqueness.3.b:0 "Our history is fairly ordinary."
 uniqueness.3.c:0 "Our country was wronged!"
 uniqueness.3.d:0 "Give Randomness"
 uniqueness.3.e:0 "Is this even readable?"
 
 uniqueness.301.desc: "Hi Chris I implemented your suggestion"
 uniqueness.301.a:0 "surprise me."
 uniqueness.301.b:0 "Give Me EVERYTHING! RANDOMIZE EVERYTHING!"
 tt_randomize_everything: "picks three random options from all regular (non-secret) decisions"
 
 uniqueness.4.desc: "A humble choice, perhaps, or is it your imposter syndrome speaking? Tell me, why do you find yourself ordinary?"
 uniqueness.4.a:0 "We have a long history of neutrality."
 uniqueness.4.b:0 "Our unindustrialised nation is a regional bread-basket"
 uniqueness.4.c:0 "We've never been anything special."
 uniqueness.4.d:0 "So we supplied this insurrection this one time..."
 
 uniqueness.5.desc: "How unfortunate. What were the set of events that led you to this terrible fate?"
 uniqueness.5.a:0 "We were beaten in a recent war, and our neighbors took territory from us!"
 uniqueness.5.b:0 "An imperial power invaded us and got the entire population high on opioids!"
 uniqueness.5.c:0 "We were subjugated by a colonial power!"
 uniqueness.5.d:0 "A corrupt elite has taken control of our nation!"
 
 uniqueness.6.desc: "Every country has an army. They should, at least. What are the major characteristics of your army?"
 uniqueness.6.a: "Quality over Quantity."
 uniqueness.6.b: "Production Trumps Not Having Enough Guns."
 uniqueness.6.c: "Innovation is the Path to Victory."
 uniqueness.6.d: "Our army isn't doing very well..."
 
 uniqueness.7.desc: "Quality trumps quantity every time. Probably. Which kind of quality are you looking for?"
 uniqueness.7.a: "Marines!"
 uniqueness.7.b: "Mountaineers!"
 uniqueness.7.c: "Paratroopers!"
 uniqueness.7.d: "Can I have the gimmick options, please?"
 uniqueness.7.e: "Flamethrower Horses."
 uniqueness.7.f: "Our most devoted followers shall serve in elite support units."
 
 uniqueness.8.desc: "Quantity over Quality, eh? What things are you good at making have big quantity?"
 uniqueness.8.a: "We are expert small arms manufacturers."
 uniqueness.8.b: "Our civilian industry produce a lot of usefull stuff."
 uniqueness.8.c: "Big guns."
 uniqueness.8.d: "No, like, REALLY big guns."
 uniqueness.8.e: "Construction is key!"
 
 uniqueness.9.desc: "This is the part where you can choose a free doctrine."
 uniqueness.9.a: "I'll have me some blitzkrieg, please."
 uniqueness.9.b: "I like big guns."
 uniqueness.9.c: "That night attack bonus is really good, trust me."
 uniqueness.9.d: "hmm yes, infantry divisions are too thicc, make me able to have more of them."
 
 uniqueness.10.desc: "Daring today, aren't we?"
 uniqueness.10.a: "Give me all the designers. I love clicking icons."
 uniqueness.10.b: "We need that tank metal for boats!"
 uniqueness.10.c: "Take the boat metal! Let's make tanks!"
 uniqueness.10.d: "okay, hear me out: Biplane Armored Personell Carriers."
 
 
 uniqueness.11.desc: "Such is the life of a nation. For others to be ahead, ther must be those, who are left having to catch up. So, what inconveniences plague your soldiers?"
 uniqueness.11.a: "Years of peace has let to neglect in the relevant industries."
 uniqueness.11.b: "Our officers are incompetent."
 uniqueness.11.c: "The general staff is corrupt."
 uniqueness.11.d: "We simply never had a modern army."
 
 uniqueness.12.desc: "Time for the last choice, then. What's more important to you: Planes? Or boats?"
 uniqueness.12.a: "Planes!"
 uniqueness.12.b: "Boats!"
 uniqueness.12.c: "Both. Both is good."
 uniqueness.12.d: "We can't build ships without dockyards!"
 uniqueness.12.e: "Maybe something else."
 
 uniqueness.13.desc: "Nice choice. Now, what's your type?"
 uniqueness.13.a: "Fighters, please."
 uniqueness.13.b: "Gimme some CAS!"
 uniqueness.13.c: "Bombers."
 uniqueness.13.d: "Bombers, but water!"
 
 uniqueness.14.desc: "Out to rule the waves, eh? How do you wanna do it?"
 uniqueness.14.a: "Bring out the big bois!"
 uniqueness.14.b: "Cruiser spam time."
 uniqueness.14.c: "Destroyers."
 uniqueness.14.d: "Bathtub."
 
 uniqueness.15.desc: "I like your taste in movies."
 uniqueness.15.a: "I want more deck size on my carriers."
 uniqueness.15.b: "Can I have ALL the designers please."
 uniqueness.15.c: "Smaller, cheaper carriers."
 uniqueness.15.d: "Carrier plane buffs."
 uniqueness.15.e: "I lied. Make the aero-hubert carrier capable."
 
 uniqueness.16.desc: "bruh, why don't you just build some, then?"
 uniqueness.16.a: "alright, fine."
 uniqueness.16.b: "Our nation is not even coastal!"
 uniqueness.16.c: "No, I don't think I will."
 uniqueness.16.d: "Invest in radio and radar instead."
 
 uniqueness.17.desc: ""
 uniqueness.17.a: "Logistics is key!"
 uniqueness.17.b: "What if we just, built a lot of bunkers."
 uniqueness.17.c: "We must expand out anti-air defenses."
 uniqueness.17.d: "Surely more factories would be handy."
 
 uniqueness.20.desc: "Through blood, sweat, and tears, you have managed to grow your army up to modern standards! What doctrine does your soldiers follow?"
 uniqueness.20.a: "I'll have me some blitzkrieg, please."
 uniqueness.20.b: "I like big guns."
 uniqueness.20.c: "That night attack bonus is really good, trust me."
 uniqueness.20.d: "hmm yes, infantry divisions are too thicc, make me able to have more of them."
 
 uniqueness.19.t: "Enable AI puppetry?"
 uniqueness.19.desc: "this event tree has an option to become the puppet of another nation. Do you want AI countries to be able to do this?"
 uniqueness.19.a: "Yes please"
 uniqueness.19.b: "No thankss"
 
 uniqueness.21.desc: "We've got all sorts of new stuff here. What would you like?"
 uniqueness.21.a: "Spin me a wheel but only with bad and dumb things on it"
 uniqueness.21.b: "We're gonna need more manpower for this"
 uniqueness.21.c: "Let's top up on resources"
 uniqueness.21.d: "Give me ideology specific options"
 
 uniqueness.22.desc: "IMPORTANT NOTE: A lot of these national spirits may be lost if you change ideology later! Check the individual spirits for more details. Oh yeah uh also some spirits are available for multiple ideologies"
 uniqueness.22.a: "I wanna be aggressive and declare war fast!"
 uniqueness.22.b: "We'd like to brainwash the entire nation please"
 uniqueness.22.c: "We need to keep our nefarious plans secret"
 uniqueness.22.d: "Let's bully our minor neighbors"
 uniqueness.22.e: "Everyone deserves free education!"
 uniqueness.22.f: "We need to protect ourselves from trouble."
 uniqueness.22.g: "Our royal bloodline descend from dinosaurs."
 uniqueness.22.h: "We'd like to be world police please"
 uniqueness.22.i: "Actually this ideology is boring give me a different one"
 
 uniqueness.23.desc: "So! What kind of minerals can I do ya for?"
 uniqueness.23.a: "Lots Aluminium and Rubber, for planes and such"
 uniqueness.23.b: "Tons of steel, with a bit of tungsten and chromium"
 uniqueness.23.c: "oil."
 uniqueness.23.d: "SPIN THE WHEEL!"
 
 uniqueness.24.desc: "Could it be there was something to be gained among the destruction?"
 uniqueness.24.a: "Massive Tsunami. The people on the coastline were changed."
 uniqueness.24.b: "Big Vulcano. Folks nearby became creaures of rock and fire."
 uniqueness.24.c: "A meteorite impact, with strange minerals within"
 uniqueness.24.d: "Terrible storm. Citizens became imbued with wind and thunder."
 
 uniqueness.25.desc: "Having more boots on the ground can certainly be neat, especially when playing as a smaller country. IMPORTANT TIP: Some of these options will get stronger the fewer states you control."
 uniqueness.25.a: "Our Capital has an underground cloning facility"
 uniqueness.25.b: "New sensus data just came in: Everyone forgot they got 10 kids."
 uniqueness.25.c: "Our non-core population is very keen on helping our cause"
 uniqueness.25.d: "I am Bhutan."
 
 uniqueness.67.desc: "All the clones are turning on us! The capital is being overrun! President, the senate is under threat! What should we do!?"
 uniqueness.67.a: "I am the senate now."
 
 uniqueness.26.desc: ""
 uniqueness.26.a: ""
